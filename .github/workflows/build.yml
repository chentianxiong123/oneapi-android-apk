name: Build OneAPI APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04-arm

    steps:
      - name: Checkout APK project
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Accept Android licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Install NDK
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;27.0.12077973" > /dev/null
          echo "NDK installed"

      - name: Clone One API source
        run: |
          git clone --depth 1 https://github.com/songquanpeng/one-api.git one-api-src

      - name: Build frontend
        run: |
          cd one-api-src/web/default
          npm install
          DISABLE_ESLINT_PLUGIN=true npm run build
          rm -rf ../build/default
          mv build ../build/default

      - name: Cross-compile Go binary
        run: |
          cd one-api-src
          NDK=$ANDROID_HOME/ndk/27.0.12077973
          export CC=$NDK/toolchains/llvm/prebuilt/linux-aarch64/bin/aarch64-linux-android31-clang
          export CGO_ENABLED=1
          export GOOS=android
          export GOARCH=arm64
          go build -tags 'osusergo' -buildmode=pie \
            -ldflags '-s -w -extldflags "-Wl,-z,max-page-size=4096"' \
            -o $GITHUB_WORKSPACE/one-api-android
          ls -lh $GITHUB_WORKSPACE/one-api-android

      - name: Patch TLS alignment
        run: |
          python $GITHUB_WORKSPACE/align_fix.py $GITHUB_WORKSPACE/one-api-android

      - name: Copy binary to jniLibs
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          cp $GITHUB_WORKSPACE/one-api-android app/src/main/jniLibs/arm64-v8a/liboneapi.so

      - name: Download tiktoken cache
        run: |
          mkdir -p app/src/main/assets
          curl -sL -o app/src/main/assets/cl100k_base.tiktoken \
            https://openaipublic.blob.core.windows.net/encodings/cl100k_base.tiktoken

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OneAPI-APK
          path: app/build/outputs/apk/debug/app-debug.apk