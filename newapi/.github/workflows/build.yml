name: Build New API APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'newapi/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v3
      - uses: android-actions/setup-android@v3

      - name: Download New API binary
        working-directory: newapi
        run: |
          curl -fL -o app/src/main/jniLibs/arm64-v8a/liboneapi.so \
            https://github.com/QuantumNous/new-api/releases/download/v1.0.0-rc.15/new-api-arm64-v1.0.0-rc.15

      - name: Build APK
        working-directory: newapi
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NewAPI.apk
          path: newapi/app/build/outputs/apk/debug/app-debug.apk